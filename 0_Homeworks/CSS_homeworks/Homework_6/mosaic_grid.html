<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Mosaic</title>
    <style>
      .mosaic-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(4, 1fr);
      }
      .mosaic-grid > div {
        border: 5px solid black;
        background-color: gainsboro;
      }
      .mosaic-grid > #one {
        border-top: none;
        border-left: none;
        grid-row: 1 / span 3;
        grid-column: 1 / span 1;
        grid
      }
      .mosaic-grid > #two {
        border-top: none;
        background-color: blanchedalmond;
      }
      .mosaic-grid > #three {
        border-top: none;
        background-color: gold;
      }
      .mosaic-grid > #four {
        background-color: blanchedalmond;
      }
      .mosaic-grid > #five {
        border-left: none;
        background-color: blanchedalmond;
      }
      .mosaic-grid > #six {
        border-left: none;
      }
      .mosaic-grid > #seven {
        border-left: none;
        border-bottom: none;
        background-color: gold;
      }
      .mosaic-grid #eight {
        background-color: crimson;
      }
      .mosaic-grid #nine {
        background-color: gold;
      }
      .mosaic-grid > #ten,
      #eleven {
      }

      .mosaic-grid #ten {
      }
      .mosaic-grid #eleven {
        background-color: blanchedalmond;
      }
      .mosaic-grid #twelve {
        background-color: rgba(0, 0, 0, 0.856);
      }
      .mosaic-grid #thirteen {
        border-bottom: none;
      }
      .mosaic-grid #fourteen {
      }
      .mosaic-grid #fifteen {
        background-color: blanchedalmond;
      }
      .mosaic-grid #sixteen {
        background-color: rgba(0, 0, 0, 0.856);
      }
      .mosaic-grid #seventeen {
        border-bottom: none;
      }
      .mosaic-grid #eighteen {
      }
      .mosaic-grid #nineteen {
        background-color: darkblue;
      }
      .mosaic-grid #twenty {
        border-right: none;
        border-bottom: none;
        background-color: crimson;
      }
    </style>
  </head>
  <body>
    <div class="mosaic-grid">
      <div id="one"></div>
      <div id="two"></div>
      <div id="three"></div>
      <div id="four"></div>
      <div id="five"></div>
      <div id="six"></div>
      <div id="seven"></div>
      <div id="eight"></div>
      <div id="nine"></div>
      <div id="ten"></div>
      <div id="eleven"></div>
      <div id="twelve"></div>
      <div id="thirteen"></div>
      <div id="fourteen"></div>
      <div id="fifteen"></div>
      <div id="sixteen"></div>
      <div id="seventeen"></div>
      <div id="eighteen"></div>
      <div id="nineteen"></div>
      <div id="twenty"></div>
    </div>
  </body>
</html>
